<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/style.css" type="text/css">
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="nav">
            <div class="logo">
                <h1><span class="logo-one">Virtual</span> <span class="logo-two">Library</span></h1>
            </div>
            
            <div class="right-nav">
                <ul class="nav-list">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Menu</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>

                <div class="add-book">
                    <button id="add-book" type="button">Add Book</button>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div id="bookshelf">
            <div class="virtual-book">
                <h2 class="book-title">Fahrenheit 451</h2>
                <h3 class="book-author">By: Ray Bradbury</h3>
                <p class="book-pages">Pages: 282</p>
                <div class="book-controls">
                    <button>Delete</button>
                    <button>Read</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>Copyright &copy; Billy English <i class="fa-brands fa-github"></i></p>
    </footer>
