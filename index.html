<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-book"></i>
            Virtual Library
        </div>

        <div class="header-controls">
            <div class="dark-mode light-mode">
                <i class="fa-sharp fa-solid fa-moon"></i>
                <i class="fa-regular fa-sun"></i>
            </div>
            <div class="hamburger-menu">
                <i class="fa-sharp fa-solid fa-bars"></i>
            </div>
        </div>
    </header>
    <main class="library">
        <section>
            <div class="bookshelf">
                <div class="virtual-book">
                    <div class="book-art">
                    </div>
                    <h2 class="book-title">Fahrenheit 451</h2>
                    <p class="author">By Ray Bradberry</p>
                    <p class="pages">Pages: 281</p>
                    <div class="book-controls">
                        <button type="button">Remove</button>
                        <button type="button">Read</button>
                    </div>
                </div>
                <div class="virtual-book">
                    <h2 class="book-title">Fahrenheit 451</h2>
                    <p class="author">By Ray Bradberry</p>
                    <p class="pages">Pages: 281</p>
                    <div class="book-controls">
                        <button type="button">Remove</button>
                        <button type="button">Read</button>
                    </div>
                </div>
                <div class="virtual-book">
                    <h2 class="book-title">Fahrenheit 451</h2>
                    <p class="author">By Ray Bradberry</p>
                    <p class="pages">Pages: 281</p>
                    <div class="book-controls">
                        <button type="button">Remove</button>
                        <button type="button">Read</button>
                    </div>
                </div>
            </div>
        </section>
        <section>
            <div class="menu">
                <h3 class="menu-title">Virtual Library</h3>

                <div class="close-icon">
                    <i class="fa-sharp fa-solid fa-xmark"></i>
                </div>

                <form class="book-form">
                    <p>Add Book</p>

                    <div>
                        <input type="text" name="title" id="title" placeholder="Title">
                    </div>
                    <div>
                        <input type="text" name="author" id="author" placeholder="Author">
                    </div>
                    <div>
                        <input type="number" name="pages" id="pages" placeholder="Pages">
                    </div>
                    <div>
                        <label id="read-label" for="read">Did you read book?
                            <input type="checkbox" name="read" id="read">
                        </label>
                    </div>
                    <div class="add-book-buttons">
                        <button type="button">Cancel</button>
                        <button type="button">Submit</button>
                    </div>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>Copyright &copy; billyenglish <i class="fa-brands fa-github"></i></p>
    </footer>
    <script src="/js/script.js"></script>
</body>
</html>
