<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p>Virtual Library</p>
            </div>

            <div class="nav-controls">
                <ul class="nav-list">
                    <li><a href="#"><i class="ri-sun-line"></i></a></li>
                    <li><a href="#"><i class="fa-regular fa-moon"></i></a></li>
                    <li><a href="#"><i class="ri-github-fill"></i></a></li>
                </ul>

                <button id="sign-in" type="button">Sign In</button>
            </div>
        </nav>
    </header>
    <main>
        <div class="button-container">
            <button id="add-book" type="button">Add Book</button>
        </div>
        <dialog class="dialog-signin">
            <div class="close-signin">
                <i class="ri-close-line"></i>
            </div>
            <form class="user-form">
                <p>Virtual Library Log In</p>
                <div>
                    <input type="text" name="username" id="username" placeholder="Username">
                </div>
                <div>
                    <input type="password" name="password" id="password" placeholder="Password">
                </div>
                <div class="user-controls">
                    <button id="cancel-signin" type="button">Cancel</button>
                    <button id="sign-in" type="submit">Sign In</button>
                </div>
            </form>
        </dialog>
        <dialog class="dialog-bookform">
            <div class="close-form">
                <i class="ri-close-line"></i>
            </div>
            <form class="add-bookform">
                <p>Add Book</p>
                <div>
                    <input type="text" name="title" id="title" placeholder="Title">
                </div>
                <div>
                    <input type="text" name="author" id="author" placeholder="Author">
                </div>
                <div>
                    <input type="number" name="pages" id="pages" min="1" placeholder="Pages">
                </div>
                <div>
                    <label class="label-read" for="read">Did you read this book?
                        <input type="checkbox" name="read" id="read">
                    </label>
                </div>
                <div class="bookform-controls">
                    <button id="cancel-bookform" type="button">Cancel</button>
                    <button id="submit-bookform" type="button">Submit</button>
                </div>
            </form>
        </dialog>
        <div id="bookshelf">
            <div class="virtual-book">
                <h2 class="title">451 Fahrenheit</h2>
                <h3 class="author">By Ray Bradbury</h3>
                <p class="pages">Pages: 242</p>
                <div class="virtual-controls">
                    <button type="button">Delete</button>
                    <button type="button">Submit</button>
                </div>
            </div>
        </div>
    </main>
    <footer>
    </footer>
    <script src="./js/script.js"></script>
</body>
</html>
