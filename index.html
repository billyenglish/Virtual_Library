<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p>Virtual Library</p>
            </div>

            <div class="nav-controls">
                <ul class="nav-list">
                    <li><a href="#"><i class="ri-sun-line"></i></a></li>
                    <li><a href="#"><i class="fa-regular fa-moon"></i></a></li>
                    <li><a href="#"><i class="ri-github-fill"></i></a></li>
                </ul>

                <button class="sign-in" type="button">Sign In</button>
            </div>
        </nav>
    </header>
    <main>
        <div class="button-container">
            <button class="add-book" type="button">Add Book</button>
        </div>
        <div class="bookshelf"></div>

        <dialog class="dialog" close>
            <div>
                <form>
                    <p>Add Book</p>
                    <div>
                        <input type="text" name="title" id="title" placeholder="Title">
                    </div>
                    <div>
                        <input type="text" name="author" id="author" placeholder="Author">
                    </div>
                    <div>
                        <input type="number" name="pages" id="pages" placeholder="Pages">
                    </div>
                    <div>
                        <label class="label-read" for="read">Have you this book?
                            <input type="checkbox" name="read" id="read">
                        </label>
                    </div>
                    <div class="form-controls">
                        <button class="clear" type="button">Clear</button>
                        <button class="submit" type="button">Submit</button>
                    </div>
                </form>
            </div>
        </dialog>

        <dialog class="dialog-userform" close>
            <form class="user-form">
                <p class="user-signin">Virtual Library</p>

                <div>
                    <input type="text" name="username" id="username" placeholder="Username">
                </div>
                <div>
                    <input type="password" name="password" id="password" placeholder="Password">
                </div>
                <div class="user-control">
                    <button class="clear-button" type="button">Clear</button>
                    <button class="sigin-button" type="button">Sign In</button>
                </div>
            </form>
        </dialog>
    </main>
    <footer>
    </footer>
    <script>
    </script>
</body>
</html>
