<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <script src="https://kit.fontawesome.com/413741196a.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        ddfsd
    </div>
    <dialog open>

        <h3 class="dialog-title">Virtual Library</h3>

        <div class="close-menu">
            <i class="fa-solid fa-xmark"></i>
        </div>

        <div class="form-container">
            <form>
                <h4 class="form-title">Virtual Book</h4>

                <div>
                    <input type="text" name="title" id="title" placeholder="Title" />
                </div>
                <div>
                    <input type="text" name="author" id="author" placeholder="Author" />
                </div>
                <div>
                    <select>
                        <option selected>Select Genre</option>
                    </select>
                </div>
                <div>
                    <input type="number" name="pages" id="pages" placeholder="Pages">
                </div>
                <div class="checkbox-read">
                    <label for="red">Have you read book ?</label>
                    <input type="checkbox" name="read" id="read">
                </div>
                <div class="form-control-panel">
                    <button type="button">Submit</button>
                    <button type="button">Cancel</button>
                </div>
            </form>
        </div>
    </dialog>
    <script src="./script.js"></script>
</body>
</html>
