<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>Virtual Library</h1>
            </div>

            <div class="nav-right">
                <div>
                    <ul class="nav-list">
                        <li><a href="#">Home</a></li>
                        <li><a href="#">Menu</a></li>
                        <li><a href="#">About</a></li>
                    </ul>
                </div>

                <div class="sign-in">
                    <button type="button">Sign In</button>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="create-book">
            <button id="create-book" type="button">Create Book</button>
        </div>
        <dialog id="dialog">
            <form>
                <h4>Add Book</h4>

                <div>
                    <input type="text" name="title" id="title" placeholder="Title" required>
                </div>
                <div>
                    <input type="text" name="author" id="author" placeholder="Author" required>
                </div>
                <div>
                    <input type="number" name="pages" id="pages" placeholder="Pages" required>
                </div>
                <div>
                    <label id="label-read" for="read">Did you read this book?
                        <input type="checkbox" name="read" id="read">
                    </label>
                </div>
                <div class="bookform-controls">
                    <button type="button">Cancel</button>
                    <button type="button">Submit</button>
                </div>
            </form>
        </dialog>
    </main>
    <footer>
        <p>Copyright &copy; billyenglish <i class="fa-brands fa-github"></i></p>
    </footer>
    <script src="./script.js"></script>
</body>
</html>
