<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p>Virtual Library</p>
            </div>

            <div class="nav-controls">
                <ul class="nav-list">
                    <li><a href="#"><i class="ri-sun-line"></i></a></li>
                    <li><a href="#"><i class="fa-regular fa-moon"></i></a></li>
                    <li><a href="#"><i class="ri-github-fill"></i></a></li>
                </ul>

                <button class="sign-in" type="button">Sign In</button>
            </div>
        </nav>
    </header>
    <main>
        <dialog class="dialog-signin" open>
                <div class="close-signin">
                        <i class="ri-close-line"></i>
                </div>
                <form class="user-form">
                    <p>Virtual Library Log In</p>
                    <div>
                        <input type="text" name="username" id="username" placeholder="Username">
                    </div>
                    <div>
                        <input type="password" name="password" id="password" placeholder="Password">
                    </div>
                    <div class="user-controls">
                        <button class="cancel-button" type="button">Cancel</button>
                        <button class="submit-button" type="button">Submit</button>
                    </div>
                </form>
        </dialog>
    </main>
    <footer>
    </footer>
    <script>
        const userSignIn = document.querySelector(".dialog-signin");
        const userSignInButton = document.querySelector(".sign-in");
        const cancelButton = document.querySelector(".cancel-button");
        const submitButton = document.querySelector(".submit-button");
        const closeIcon = document.querySelector(".close-signin");

        userSignInButton.addEventListener("click", () => {
            userSignIn.showModal();
        });

        cancelButton.addEventListener("click", () => {
            alert("Cancel Button");
        });

        submitButton.addEventListener("click", () => {
            alert("Submit Button");
        });

        closeIcon.addEventListener("click", () => {
            userSignIn.close();
        });
    </script>
</body>
</html>
