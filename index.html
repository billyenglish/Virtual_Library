<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./css/reset.css" type="text/css">
    <link rel="stylesheet" href="./css/styles.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="image/icons8-book-60.png">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p>Virtual Library</p>
            </div>

            <div class="nav-controls">
                <ul class="nav-list">
                    <li><a href="#"><i class="ri-sun-line"></i></a></li>
                    <li><a href="#"><i class="fa-regular fa-moon"></i></a></li>
                    <li><a href="#"><i class="ri-github-fill"></i></a></li>
                </ul>

                <button class="sign-in" type="button">Sign In</button>
            </div>
        </nav>
    </header>
    <main>
        <div class="button-container">
            <button class="add-book" type="button">Add Book</button>
        </div>
        <dialog class="dialog-signin">
            <div class="close-signin">
                <i class="ri-close-line"></i>
            </div>
            <form class="user-form">
                <p>Virtual Library Log In</p>
                <div>
                    <input type="text" name="username" id="username" placeholder="Username">
                </div>
                <div>
                    <input type="password" name="password" id="password" placeholder="Password">
                </div>
                <div class="user-controls">
                    <button class="cancel-button" type="button">Cancel</button>
                    <button class="submit-button" type="button">Sign In</button>
                </div>
            </form>
        </dialog>
        <dialog class="dialog-bookform">
            <div class="close-form">
                <i class="ri-close-line"></i>
            </div>
            <form class="add-bookform">
                <p>Add Book</p>
                <div>
                    <input type="text" name="title" id="title" placeholder="Title">
                </div>
                <div>
                    <input type="text" name="author" id="author" placeholder="Author">
                </div>
                <div>
                    <input type="number" name="pages" id="pages" placeholder="Pages">
                </div>
                <div>
                    <label class="label-read" for="read">Did you read this book?
                        <input type="checkbox" name="read" id="read">
                    </label>
                </div>
                <div class="bookform-controls">
                    <button class="cancel-button" type="button">Cancel</button>
                    <button class="cancel-button" type="button">Submit</button>
                </div>
            </form>
        </dialog>
    </main>
    <footer>
    </footer>
    <script>
        const userSignIn = document.querySelector(".dialog-signin");
        const userSignInButton = document.querySelector(".sign-in");
        const cancelButton = document.querySelector(".cancel-button");
        const submitButton = document.querySelector(".submit-button");
        const closeIcon = document.querySelector(".close-signin");
        const addBook = document.querySelector(".add-book");
        const bookForm = document.querySelector(".dialog-bookform");
        const closeForm = document.querySelector(".close-form");
        const bookTitle = document.querySelector("#title");
        const bookAuthor = document.querySelector("#author");
        const bookPages = document.querySelector("#pages");
        const readBook = document.querySelector("#read");

        function clearForm() {
            let userName = document.querySelector("#username");
            let password = document.querySelector("#password");

            userName.value = "";
            password.value = "";

            return;
        }

        function clearBookForm () {
            bookTitle.value = "";
            bookAuthor.value = "";
        }

        closeForm.addEventListener("click", () => {
            bookForm.close();
        });

        addBook.addEventListener("click", () => {
            bookForm.showModal();
            clearBookForm();
        });

        userSignInButton.addEventListener("click", () => {
            userSignIn.showModal();
        });

        cancelButton.addEventListener("click", () => {
            clearForm();
        });

        submitButton.addEventListener("click", () => {
            alert("Submit Button");
        });

        closeIcon.addEventListener("click", () => {
            userSignIn.close();
        });
    </script>
</body>
</html>
