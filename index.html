<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link rel="stylesheet" href="./styles.css" type="text/css">
    <script src="https://kit.fontawesome.com/9c98ae8183.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <div>
                    <h1 class="nav-logo">Virtual Library</h1>
                </div>

                <div>
                    <button class="hamburger-menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </nav>
        </header>
        <main>Main</main>
        <aside>Aside</aside>
        <footer>Footer</footer>
        <dialog open>
            <form>
                <div>
                    <input type="text" name="book-title" id="book-title" placeholder="Book Title" />
                </div>
                <div>
                    <input type="text" name="book-author" id="book-author" placeholder="Book Author" />
                </div>
                <div>
                    <select>
                        <option value="" disabled selected>Select A Genre</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Sci-fi">Sci-Fiction</option>
                        <option value="Non-fi">Non-Fiction</option>
                        <option value="Thriller">Thriller</option>
                    </select>
                </div>
                <div>
                    <input type="number" min="1" placeholder="0" />
                </div>
                <div>
                    <label>
                        I've been read?
                        <input type="checkbox" />
                    </label>
                </div>
                <div class="form-control-panel">
                    <button>Cancel</button>
                    <button>Submit</button>
                </div>
            </form>
        </dialog>
    </div>
    <script src="./script.js"></script>
</body>
</html>
