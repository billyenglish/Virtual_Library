<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Library</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css"
    >
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1 id="logo">Virtual Library</h1>
            </div>

            <div>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                </label>
            </div>
        </header>
        <main>
            Main
        </main>
        <aside>
            <nav>
                <div class="nav-section">
                    <h2>Feature Books</h2>

                    <div class="nav-list-container">
                        <ul class="nav-list">
                            <li class="nav-item">
                                <i class='bx  bx-book'></i>
                                New Arrivals
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-check-square'></i> 
                                Staff Picks
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-star'></i>
                                Top Books
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-medal'></i>
                                Award Winners
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-calendar-star'></i>
                                Events
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="nav-section">
                    <h2>Categories</h2>

                    <div class="nav-list-container">
                        <ul class="nav-list">
                            <li class="nav-item">
                                <i class='bx  bx-check-square'></i>
                                Fiction
                            </li>
                            <li class="nav-item">
                                Non-Fiction
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-rocket'></i> 
                                Science Fiction
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-mask'></i>
                                Fantasy
                            </li>
                            <li class="nav-item">
                                <i class='bx  bx-search-alt'>
                                </i> Mystery</li>
                            <li class="nav-item">Biography</li>
                            <li class="nav-item">
                                <i class='bx  bx-wrist-watch-round'></i> 
                                History
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="nav-section">
                    <button type="button" id="add-new-book">
                        Add New Book
                    </button>
                </div>
            </nav>
        </aside>
        <footer>
            <p>&copy; <span>2025</span> Virtual Library. All rights reserved.</p>
        </footer>
        <dialog>
            <form>
                <div class="close-menu">
                    <i class='bx bx-x'></i>
                </div>
                <h2>Create Virtual Book</h2>
                <div>
                    <input
                        type="text"
                        name="book-title"
                        id="book-title"
                        placeholder="Title"
                    />
                </div>
                <div>
                    <input
                        type="text"
                        name="book-author"
                        id="book-author"
                        placeholder="Author"
                    />
                </div>
                <div>
                    <select name="book-genre" id="book-genre">
                        <option>Select Genre</option>
                        <option value="fiction">Fiction</option>
                        <option value="non-fiction">Non-Fiction</option>
                        <option value="science-fiction">Science Fiction</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="mystery">Mystery</option>
                        <option value="biography">Biography</option>
                        <option value="history">History</option>
                    </select>
                </div>
                <div>
                    <input
                        type="number"
                        name="book-pages"
                        id="book-pages"
                        placeholder="Number of Pages: 1"
                        min="1"
                    />
                </div>
                <div class="control-panel">
                    <button type="button" id="cancel">Cancel</button>
                    <button type="button" id="submit">Submit</button>
                </div>
            </form>
        </dialog>
    </div>
</body>
</html>
